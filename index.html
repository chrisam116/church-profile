<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>البطاقة الشخصية للدخول</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #f0f4f8; font-family: 'Cairo', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .id-card { background: white; border-radius: 30px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); padding: 40px 20px; text-align: center; max-width: 400px; width: 90%; position: relative; overflow: hidden; }
        .card-header { background: #0984e3; color: white; padding: 20px; position: absolute; top: 0; left: 0; right: 0; font-weight: 900; font-size: 1.5rem; }
        .qr-box { background: white; padding: 15px; border-radius: 20px; display: inline-block; margin: 80px 0 20px 0; border: 3px dashed #bdc3c7; }
        .qr-img { width: 200px; height: 200px; }
        .btn-download { background: #2ecc71; color: white; font-weight: bold; border-radius: 50px; padding: 15px 30px; font-size: 1.2rem; text-decoration: none; display: inline-block; transition: 0.3s; margin-top: 15px; width: 100%; border: none;}
        .btn-download:hover { background: #27ae60; color: white; transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div class="id-card">
    <div class="card-header">⛪ كنيسة الأنبا تكلا</div>
    
    <div class="qr-box">
        <!-- يتم توليد الصورة عبر الـ API بمجرد قراءة الرابط -->
        <img id="qrImage" src="" class="qr-img" alt="QR Code" style="display: none;">
    </div>
    
    <h3 class="fw-bold text-dark mb-1" id="userName">جاري التحميل...</h3>
    <h4 class="text-secondary fw-bold mb-4">كود: <span class="badge bg-primary" id="userCode">...</span></h4>
    
    <p class="text-muted mb-4" style="font-size: 0.9rem;">احتفظ بهذه الصورة (Screenshot) أو قم بتحميلها لتتمكن من تسجيل الدخول من خلال الهاتف.</p>
    
    <button onclick="downloadQR()" class="btn-download">💾 تحميل الـ QR Code</button>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const name = urlParams.get('n');
    const code = urlParams.get('c');

    if(name && code) {
        document.getElementById('userName').innerText = name;
        document.getElementById('userCode').innerText = code;
        const qrUrl = "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=" + code;
        document.getElementById('qrImage').src = qrUrl;
        document.getElementById('qrImage').style.display = "block";
    } else {
        document.getElementById('userName').innerText = "الرابط غير صالح";
        document.getElementById('userName').style.color = "red";
    }

    async function downloadQR() {
        if(!code) return alert("لا يوجد كود لتحميله");
        const imageSrc = document.getElementById('qrImage').src;
        const image = await fetch(imageSrc);
        const imageBlog = await image.blob();
        const imageURL = URL.createObjectURL(imageBlog);
        const link = document.createElement('a');
        link.href = imageURL;
        link.download = `Church_QR_${name}.png`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>
</body>
</html>
