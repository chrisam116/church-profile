<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الكنيسة الذكية 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* تم تعديل الـ body لإضافة خاصية الـ Flexbox لضمان بقاء الفوتر بالأسفل */
        body { 
            background: linear-gradient(135deg, #f0f4f8, #e2e8f0); 
            font-family: 'Cairo', sans-serif; 
            min-height: 100vh; 
            display: flex;
            flex-direction: column;
            padding-top: 40px; /* مسافة من الأعلى */
            margin: 0;
        }
        
        .portal-card { 
            background: white; 
            border-radius: 30px; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.1); 
            padding: 40px 20px; 
            text-align: center; 
            max-width: 500px; 
            width: 95%; 
            margin: 0 auto 40px auto; /* إضافة مسافة من الأسفل */
            border-top: 8px solid #0984e3; 
        }
        
        .logo-icon { font-size: 3.5rem; margin-bottom: 10px; }
        .input-code { font-size: 1.5rem; text-align: center; font-weight: bold; letter-spacing: 2px; border-radius: 15px; border: 2px solid #0984e3; padding: 15px; }
        .btn-search { background: #0984e3; color: white; font-weight: bold; border-radius: 15px; padding: 15px; font-size: 1.2rem; width: 100%; margin-top: 15px; transition: 0.3s; border: none; }
        .btn-search:hover { background: #0652dd; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(9, 132, 227, 0.3); }
        
        .results-container { margin-top: 30px; display: flex; flex-direction: column; gap: 20px; }
        .user-card { background: #f8f9fa; border: 2px solid #eef2f5; border-radius: 20px; padding: 20px; text-align: center; animation: fadeIn 0.5s ease-in-out; position: relative;}
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        
        .qr-img { width: 200px; height: 200px; border: 3px solid #ddd; border-radius: 15px; padding: 10px; margin-bottom: 15px; background: white; }
        .profile-img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; margin-bottom: 10px; border: 4px solid #0984e3; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .sibling-badge { position: absolute; top: 15px; right: 15px; background: #e74c3c; color: white; padding: 5px 10px; border-radius: 10px; font-size: 0.8rem; font-weight: bold; }

        /* تصميم الفوتر (الشريط السفلي) */
        .custom-footer {
            margin-top: auto; /* يدفع الفوتر لأقصى الأسفل */
            padding: 15px 20px;
            text-align: center;
            background: rgba(255, 255, 255, 0.4); /* تأثير زجاجي خفيف */
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(0,0,0,0.05);
            color: #6c757d;
            font-size: 0.95rem;
            font-weight: 600;
            width: 100%;
        }
        .custom-footer .dev-name {
            color: #0984e3;
            font-weight: 900;
            letter-spacing: 0.5px;
            font-family: sans-serif;
        }
    </style>
</head>
<body>

<div class="portal-card">
    <div class="logo-icon">⛪</div>
    <h3 class="fw-bold text-dark mb-2">بوابة استخراج الأكواد</h3>
    <p class="text-muted mb-4">أدخل كودك ليظهر لك الـ QR الخاص بحضورك في كورس دراسات كتابيه وتنميه</p>
    
    <input type="number" id="code-input" class="form-control input-code" placeholder="رقم الكود..." onkeypress="if(event.key === 'Enter') searchCode()">
    <button onclick="searchCode()" class="btn-search">🔍 بحث واستخراج</button>

    <!-- سيتم وضع الكروت هنا ديناميكياً -->
    <div class="results-container" id="results-container"></div>
</div>

<!-- الشريط السفلي (Footer) -->
<footer class="custom-footer">
    &copy; 2026 All Rights Reserved | Developed by <span class="dev-name">Chris Samuel</span>
</footer>

<script>
    let dbData = {};

    fetch('data.json')
        .then(response => response.json())
        .then(data => { dbData = data; })
        .catch(error => console.error('Error loading data:', error));

    function searchCode() {
        const inputCode = document.getElementById('code-input').value.trim();
        const container = document.getElementById('results-container');
        container.innerHTML = ''; 
        
        if (!inputCode) return alert("الرجاء إدخال الكود أولاً!");
        if (!dbData[inputCode]) return alert("❌ الكود غير صحيح أو غير مسجل!");

        const targetPhone = dbData[inputCode].phone;
        let familyMembers =[];

        // تجميع كل العائلة اللي عندهم نفس رقم التليفون
        if(targetPhone && targetPhone !== "") {
            for (let code in dbData) {
                if (dbData[code].phone === targetPhone) {
                    familyMembers.push({code: code, data: dbData[code]});
                }
            }
        } else {
            // لو معندوش رقم تليفون مسجل، نعرضه هو بس
            familyMembers.push({code: inputCode, data: dbData[inputCode]});
        }

        // رسم كارت لكل شخص في العائلة
        familyMembers.forEach(member => {
            const isMain = member.code === inputCode;
            const badge = !isMain ? `<div class="sibling-badge">إخوة</div>` : '';
            const imgHtml = member.data.image ? `<img src="${member.data.image}" class="profile-img">` : '';
            
            const card = `
                <div class="user-card">
                    ${badge}
                    ${imgHtml}
                    <h4 class="fw-bold text-primary mb-1">${member.data.name}</h4>
                    <p class="text-muted fw-bold">كود: <span class="badge bg-dark fs-6">${member.code}</span></p>
                    
                    <div>
                        <img id="qr-${member.code}" src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${member.code}" class="qr-img">
                    </div>
                    
                    <button onclick="downloadQR('${member.code}', '${member.data.name}')" class="btn btn-success w-100 fw-bold rounded-pill shadow-sm mt-2">💾 تحميل صورة الـ QR</button>
                </div>
            `;
            container.innerHTML += card;
        });
    }

    async function downloadQR(code, name) {
        const imageSrc = document.getElementById(`qr-${code}`).src;
        const image = await fetch(imageSrc);
        const imageBlog = await image.blob();
        const imageURL = URL.createObjectURL(imageBlog);
        
        const link = document.createElement('a');
        link.href = imageURL;
        link.download = `Church_Card_${name}.png`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>
</body>
</html>
