<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>البطاقة الشخصية للدخول</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0984e3; font-family: 'Cairo', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card-custom { background: white; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.2); padding: 40px 20px; text-align: center; max-width: 400px; width: 90%; }
        .qr-box { background: #f8f9fa; padding: 15px; border-radius: 20px; display: inline-block; margin: 20px 0; border: 2px dashed #ccc; }
        .qr-img { width: 220px; height: 220px; }
    </style>
</head>
<body>
<div class="card-custom">
    <h3 class="fw-bold text-secondary mb-1">أهلاً بك يا</h3>
    <h1 class="fw-bold text-primary mb-0" id="userName" style="font-weight: 900;">...</h1>
    
    <div class="qr-box">
        <!-- السحر هنا: الصورة دي هتتولد أوتوماتيك من الكود اللي في الرابط -->
        <img id="qrImage" src="" class="qr-img" alt="QR Code">
    </div>
    
    <h4 class="text-dark fw-bold mb-4">كودك التعريفي: <span class="badge bg-danger" id="userCode">...</span></h4>
    <p class="text-muted mb-0" style="font-size: 0.9rem;">احتفظ بهذه الشاشة (Screenshot) لاستخدامها عند دخول الكنيسة.</p>
</div>

<script>
    // جافاسكريبت لسحب الاسم والكود من الرابط
    const urlParams = new URLSearchParams(window.location.search);
    const name = urlParams.get('n');
    const code = urlParams.get('c');

    if(name && code) {
        document.getElementById('userName').innerText = name;
        document.getElementById('userCode').innerText = code;
        // إنشاء الـ QR كود مجاناً ومباشرة
        document.getElementById('qrImage').src = "https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=" + code;
    } else {
        document.getElementById('userName').innerText = "رابط غير صالح";
    }
</script>
</body>
</html>
