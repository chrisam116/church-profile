<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>البطاقة الشخصية للدخول</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #0984e3, #74b9ff); font-family: 'Cairo', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .id-card { background: white; border-radius: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); padding: 40px 20px; text-align: center; max-width: 380px; width: 90%; position: relative; overflow: hidden; border-top: 8px solid #2d3436; }
        .qr-box { background: #fff; padding: 15px; border-radius: 20px; display: inline-block; margin: 25px 0; border: 2px dashed #0984e3; box-shadow: 0 10px 20px rgba(9, 132, 227, 0.1); }
        .qr-img { width: 220px; height: 220px; }
        .btn-download { background: #0984e3; color: white; font-weight: bold; border-radius: 50px; padding: 12px 30px; font-size: 1.1rem; text-decoration: none; display: inline-block; transition: 0.3s; margin-top: 10px; width: 100%; border: none;}
        .btn-download:hover { background: #0652dd; color: white; transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .church-logo { width: 60px; margin-bottom: 15px; opacity: 0.8; }
    </style>
</head>
<body>

<div class="id-card">
    <h4 class="fw-bold text-secondary mb-1">أهلاً بك يا</h4>
    <h2 class="fw-bold text-primary mb-0" id="userName" style="font-weight: 900;">جاري التحميل...</h2>
    
    <div class="qr-box">
        <!-- السحر: الصورة تتولد من الكود مجاناً من سيرفر QR عالمي -->
        <img id="qrImage" src="" class="qr-img" alt="QR Code" style="display: none;">
    </div>
    
    <h4 class="text-dark fw-bold mb-3">كودك التعريفي: <span class="badge bg-danger" id="userCode">...</span></h4>
    
    <p class="text-muted mb-4" style="font-size: 0.85rem;">احتفظ بهذه الشاشة (Screenshot) أو قم بتحميل الصورة لاستخدامها عند دخول الكنيسة.</p>
    
    <button onclick="downloadQR()" class="btn-download">💾 تحميل رمز الدخول (QR)</button>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const name = urlParams.get('n');
    const code = urlParams.get('c');

    if(name && code) {
        document.getElementById('userName').innerText = name;
        document.getElementById('userCode').innerText = code;
        const qrUrl = "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=" + code;
        document.getElementById('qrImage').src = qrUrl;
        document.getElementById('qrImage').style.display = "block";
    } else {
        document.getElementById('userName').innerText = "رابط غير صالح!";
        document.getElementById('userName').style.color = "red";
    }

    async function downloadQR() {
        if(!code) return alert("لا يوجد كود لتحميله");
        const imageSrc = document.getElementById('qrImage').src;
        const image = await fetch(imageSrc);
        const imageBlog = await image.blob();
        const imageURL = URL.createObjectURL(imageBlog);
        const link = document.createElement('a');
        link.href = imageURL;
        link.download = `QR_Code_${name}.png`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>
</body>
</html>
