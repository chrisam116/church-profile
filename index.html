<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الكنيسة الذكية 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #f0f4f8, #e2e8f0); font-family: 'Cairo', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .portal-card { background: white; border-radius: 30px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); padding: 40px 20px; text-align: center; max-width: 450px; width: 90%; border-top: 8px solid #0984e3; }
        .logo-icon { font-size: 3.5rem; margin-bottom: 10px; }
        .input-code { font-size: 1.5rem; text-align: center; font-weight: bold; letter-spacing: 2px; border-radius: 15px; border: 2px solid #0984e3; padding: 15px; }
        .btn-search { background: #0984e3; color: white; font-weight: bold; border-radius: 15px; padding: 15px; font-size: 1.2rem; width: 100%; margin-top: 15px; transition: 0.3s; border: none; }
        .btn-search:hover { background: #0652dd; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(9, 132, 227, 0.3); }
        .result-box { display: none; margin-top: 30px; padding-top: 25px; border-top: 2px dashed #ddd; animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .qr-img { width: 220px; height: 220px; border: 3px solid #eee; border-radius: 20px; padding: 10px; margin-bottom: 15px; background: white; }
        .profile-img { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; margin-bottom: 15px; border: 4px solid #0984e3; display: none; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="portal-card">
    <div class="logo-icon">⛪</div>
    <h3 class="fw-bold text-dark mb-2">بوابة استخراج الكود</h3>
    <p class="text-muted mb-4">أدخل رقم الكود الخاص بك للحصول على بطاقة الدخول (QR Code).</p>
    
    <input type="number" id="code-input" class="form-control input-code" placeholder="مثال: 1005" onkeypress="if(event.key === 'Enter') searchCode()">
    <button onclick="searchCode()" class="btn-search">🔍 بحث واستخراج</button>

    <div class="result-box" id="result-box">
        <img id="user-photo" src="" class="profile-img" alt="الصورة الشخصية" onerror="this.style.display='none'">
        <h3 class="fw-bold text-primary mb-1" id="user-name">الاسم</h3>
        <p class="text-muted fw-bold">كود التسجيل: <span class="badge bg-dark fs-6" id="user-code">1000</span></p>
        
        <div style="background: #f8f9fa; border-radius: 20px; padding: 15px; display: inline-block; margin-bottom: 15px;">
            <img id="qr-image" src="" class="qr-img" alt="QR Code">
        </div>
        
        <button onclick="downloadQR()" class="btn btn-success w-100 fw-bold rounded-pill py-3 fs-5 shadow-sm">💾 تحميل الـ QR Code</button>
    </div>
</div>

<script>
    let dbData = {};

    // تحميل ملف البيانات المخفي (data.json)
    fetch('data.json')
        .then(response => response.json())
        .then(data => { dbData = data; })
        .catch(error => console.error('Error loading data:', error));

    function searchCode() {
        const code = document.getElementById('code-input').value.trim();
        const resultBox = document.getElementById('result-box');
        
        if (!code) return alert("الرجاء إدخال الكود أولاً!");
        
        // البحث عن الكود في الملف
        if (dbData[code]) {
            const user = dbData[code];
            document.getElementById('user-name').innerText = user.name;
            document.getElementById('user-code').innerText = code;
            
            // تحميل الصورة الشخصية (إن وجدت وكانت صالحة)
            const photoEl = document.getElementById('user-photo');
            if(user.image) {
                photoEl.src = user.image;
                photoEl.style.display = "inline-block";
            } else {
                photoEl.style.display = "none";
            }

            // توليد الـ QR ديناميكياً
            document.getElementById('qr-image').src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${code}`;
            
            resultBox.style.display = "block";
        } else {
            alert("❌ الكود غير صحيح أو غير مسجل في النظام!");
            resultBox.style.display = "none";
        }
    }

    async function downloadQR() {
        const code = document.getElementById('user-code').innerText;
        const name = document.getElementById('user-name').innerText;
        const imageSrc = document.getElementById('qr-image').src;
        
        const image = await fetch(imageSrc);
        const imageBlog = await image.blob();
        const imageURL = URL.createObjectURL(imageBlog);
        
        const link = document.createElement('a');
        link.href = imageURL;
        link.download = `Church_Card_${name}_${code}.png`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>
</body>
</html>
